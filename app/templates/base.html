<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin{% endblock %} — MindBody-Dahua Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    [hx-indicator] .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
    .toast { animation: slideIn 0.3s ease-out, fadeOut 0.5s ease-in 3.5s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body class="h-full" hx-boost="true">

{% if session_user %}
<div class="flex h-full">
  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-gray-700">
      <h1 class="text-lg font-bold tracking-tight">Gate Sync</h1>
      <p class="text-xs text-gray-400 mt-1">MindBody ↔ Dahua</p>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="/admin/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'dashboard' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
        Dashboard
      </a>
      <a href="/admin/members" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'members' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
        Members
      </a>
      <a href="/admin/mindbody-users" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'mindbody_users' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        MindBody Users
      </a>
      <a href="/admin/devices" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'devices' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        Devices
      </a>
      <a href="/admin/sync" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'sync' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Sync Logs
      </a>
      <a href="/admin/exports" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm {% if active_page == 'exports' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800 hover:text-white{% endif %} transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        Exports
      </a>
    </nav>
    <div class="p-4 border-t border-gray-700">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-400">{{ session_user }}</span>
        <a href="/admin/logout" hx-boost="false" class="text-xs text-gray-500 hover:text-red-400 transition-colors">Logout</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto">
    <div class="p-8">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

{% else %}
  {% block fullpage %}{% endblock %}
{% endif %}

</body>
</html>
